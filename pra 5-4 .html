<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>리스트 만들기</title>
<style>
    
    ul {
        width: 300px;
        padding: 20px;
        border: 1px solid lightgray;
        list-style-type: square;

        
        background-image: url("media/worldmap.png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
    }

    
    h3 {
        margin-left: 20px;
    }

  
    li {
        padding-right: 10px;   /* 오른쪽 여백 */
    }

   
    li:hover {
        background-color: yellowgreen;
    }

    /* 링크 색상 */
    a {
        color: blue;
        text-decoration: none;
    }

    a:visited {
        color: gray;
    }

    a:hover {
        color: white;
    }
</style>
</head>
<body>

<h3>가보고 싶은 나라</h3>

<ul>
    <li><a href="#">프랑스</a></li>
    <li><a href="#">독일</a></li>
    <li><a href="#">칠레</a></li>
    <li><a href="#">남아프리카공화국</a></li>
</ul>

</body>
</html>
