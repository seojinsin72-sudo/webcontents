<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>도형 서식 폼 만들기</title>
</head>
<body>
    <h3>도형 서식 폼 만들기</h3>
    <form>
        선종류
        <select name="china">
            <option value="1">선없음</option>
            <option value="2">실선</option>
            <option value="3">점선</option>
        </select>
    </form>
    <br>
    <form>
        선두께
        <input type="text" size="5">
        선색
        <input type="color">
    </form>
    <br>
    <form>
        투명도(0~100)
        <input type="range" min="0" max="100"
                                    list="temperatures">
        <datalist id="temperatures">
            <option value="10" label="Low"></option>
            <option value="50" label="Medium"></option>
            <option value="100" label="High"></option>
        </datalist>
    </form>
</body>
</html>
