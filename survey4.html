
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문지</title>

<style>
    body {
        background-color: aliceblue;
        font-family: "맑은 고딕", sans-serif;
    }

    .container {
        width: 800px;
        margin: 30px auto;
        background-color: white;
        border: 1px solid #999;
    }

    header {
        border: 1px solid black;
        padding: 20px;
        text-align: center;
    }

    h1 {
        color: brown;
        text-align: center;
        margin: 0;
    }

    p {
        font-size: 1em;
        line-height: 1.6em;
        padding-left: 1em;
    }

    hr {
        margin: 20px 0;
    }

    form {
        background-color: pink;
        padding: 20px;
        line-height: 2em;
    }

    label {
        margin-right: 10px;
    }

    select {
        width: 200px;
        height: 30px;
    }

    textarea {
        width: 300px;
        height: 120px;
        resize: none;
    }

    footer {
        background: orange;
        border-radius: 10px;
        padding: 8px 15px;
        margin: 20px;
        font-style: italic;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="container">

    <header>
        <h1>설문지</h1>
    </header>

    <p>
        소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
    </p>

    <hr>

    <form>
        <label>학년</label>
        <input type="radio" name="grade" checked> 1학년
        <input type="radio" name="grade"> 2학년
        <input type="radio" name="grade"> 3학년
        <br>

        <label>성별</label>
        <input type="radio" name="gender"> 남
        <input type="radio" name="gender"> 여
        <br>

        <label>관심 분야</label>
        <select>
            <option>모바일 소프트웨어</option>
            <option>웹 프로그래밍</option>
            <option>인공지능</option>
            <option>게임 개발</option>
        </select>
        <br>

        <label>진로</label>
        <input type="checkbox"> 개발
        <input type="checkbox"> 기획
        <input type="checkbox"> 영업
        <input type="checkbox"> 창업
        <br><br>

        <label>남기고 싶은 말</label><br>
        <textarea placeholder="글을 남겨 주세요"></textarea>
    </form>

    <footer>
        Copyright 2026 by MYONGJI COLLEGE
    </footer>

</div>

</body>
</html>
