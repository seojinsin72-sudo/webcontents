<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <title>색 이름과 코드</title>
    <style>
        h3 {
            margin-left: 20px;
        }
        table {
            border-collapse: collapse;
            margin: 20px;
        }
        th, td {
            border: 1px solid gray;
            padding: 5px 10px;
            text-align: center;
        }
        #brown {
            background-color:brown ;
            width: 60px;
            height: 30px;
        }
        #deepskyblue {
            background-color: #00BFFF;
            width: 60px;
            height: 30px;
        }
        #blueviolet {
            background-color: #8A2BE2;
            width: 60px;
            height: 30px;
        }
        #gold {
            background-color: #FFD700;
            width: 60px;
            height: 30px;
        }
        #darkorange {
            background-color: #FF8C00;
            width: 60px;
            height: 30px;
        }
        #olivedrab {
            background-color: #6B8E23;
            width: 60px;
            height: 30px;
        }

    </style>
    </head>
    <body>
         <h3>색 이름과 코드</h3>
         <table border=1>
            <tr>
                <th>이름</th>
                <th>코드</th>
                <th>색</th>
                <th>이름</th>
                <th>코드</th>
                <th>색</th>
            </tr>

            <tr>
                <td>Brown</td>
                <td>#A52A2A</td>
                <td><div id="brown"></div></td>
                <td>deepskyblue</td>
                <td>#00BFFF</td>
                <td><div id="deepskyblue"></div></td>
            </tr>

            <tr>
                <td>Blueviolet</td><td>#8A2BE2</td>
                <td><div id="blueviolet"></div></td>
                <td>Gold</td>
                <td>#FFD700</td>
                <td><div id="gold"></div></td>
            </tr>

             <tr>
                <td>DarkOrange</td>
                <td>#FF8C00</td>
                <td><div id="darkorange"></div></td>
                <td>OliveDrab</td>
                <td>#6B8E23</td>
                <td><div id="olivedrab"></div></td>
            </tr>
         </table>
    </body>
</html>
